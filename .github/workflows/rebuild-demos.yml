name: Rebuild WASM demos

on:
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:
    inputs:
      examples_ref:
        description: 'Branche / tag / SHA des repos rs-grid-example-* à builder'
        default: 'main'
        required: false

  # Déclenchement depuis rs-grid via repository_dispatch (sur release v*).
  # Dans rs-grid : curl -X POST .../dispatches -d '{"event_type":"rs-grid-released","client_payload":{"ref":"v1.2.3"}}'
  # client_payload.ref = le tag rs-grid publié (info / message de commit). Les
  # démos sont buildées depuis rs-grid-example-*@main : chaque repo épingle
  # lui-même la version rs-grid (tag) dans son Cargo.toml.
  repository_dispatch:
    types: [rs-grid-released]

permissions:
  contents: write

env:
  EXAMPLES_REF: ${{ github.event.inputs.examples_ref || 'main' }}
  # The example crates depend on the PRIVATE rs-grid repo via git+tag. Force
  # cargo to fetch git deps through the git CLI so it honours the credential
  # rewrite configured below (libgit2 ignores it and fails to authenticate).
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rs-grid-site
        uses: actions/checkout@v4

      # The four demos now live in their own repos (extracted from rs-grid's
      # in-tree examples/*). Each is checked out as a sibling-style folder the
      # rebuild script reads via the *_SRC env vars.
      - name: Checkout rs-grid-example-js
        uses: actions/checkout@v4
        with:
          repository: ruxelion/rs-grid-example-js
          ref: ${{ env.EXAMPLES_REF }}
          path: rs-grid-example-js
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Checkout rs-grid-example-leptos
        uses: actions/checkout@v4
        with:
          repository: ruxelion/rs-grid-example-leptos
          ref: ${{ env.EXAMPLES_REF }}
          path: rs-grid-example-leptos
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Checkout rs-grid-example-dioxus
        uses: actions/checkout@v4
        with:
          repository: ruxelion/rs-grid-example-dioxus
          ref: ${{ env.EXAMPLES_REF }}
          path: rs-grid-example-dioxus
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Checkout rs-grid-example-yew
        uses: actions/checkout@v4
        with:
          repository: ruxelion/rs-grid-example-yew
          ref: ${{ env.EXAMPLES_REF }}
          path: rs-grid-example-yew
          token: ${{ secrets.DEPLOY_TOKEN }}

      # Node is needed by the leptos demo: its Trunk pre_build hook compiles
      # Tailwind (scripts/build-css.mjs → npm). Cache keyed on its lockfile.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: rs-grid-example-leptos/package-lock.json

      - name: Setup Rust (stable + wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & bins
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-demos-${{ hashFiles('rs-grid-example-*/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-demos-

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack &> /dev/null; then
            curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          fi

      - name: Install trunk
        run: |
          if ! command -v trunk &> /dev/null; then
            cargo install --locked trunk
          fi

      # The example crates pull rs-grid (private) as a git+tag dependency.
      # Rewrite github.com fetches to embed the deploy token so cargo can clone
      # it; paired with CARGO_NET_GIT_FETCH_WITH_CLI=true above.
      - name: Authenticate cargo to private rs-grid
        run: |
          git config --global url."https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Rebuild demos
        env:
          JS_SRC: rs-grid-example-js
          LEPTOS_SRC: rs-grid-example-leptos
          DIOXUS_SRC: rs-grid-example-dioxus
          YEW_SRC: rs-grid-example-yew
        run: bash scripts/update-wasm-demo.sh

      - name: Commit & push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/public/wasm docs/public/demos
          git diff --staged --quiet && echo "Rien à commiter" && exit 0
          git commit -m "chore: rebuild WASM demos (examples@${EXAMPLES_REF}, rs-grid release ${{ github.event.client_payload.ref || 'manual' }})"
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/${{ github.repository }}
          git pull --rebase --autostash origin main
          git push
